<div class="page-shell">
  <app-page-header></app-page-header>

  <main class="content-wrap">
    <img class="keyboard-hero" src="/keyboard.svg" alt="" aria-hidden="true" draggable="false" />
    <h1 class="page-title">Formulaire Tapotons</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="form-layout">
      <app-personal-info-section [form]="form" [genders]="genders"></app-personal-info-section>

      <app-account-type-section
        [form]="form"
        [accountTypes]="accountTypes"
        [isPremium]="isPremium"
        [isCouponLoading]="isCouponLoading"
        [couponUiState]="couponUiState"
        [couponFeedback]="couponFeedback"
        (validateCoupon)="validateCoupon()"
      ></app-account-type-section>

      <app-typing-level-section
        [form]="form"
        [typingSites]="typingSites"
        [usedTypingSite]="usedTypingSite"
        (typingSiteToggled)="onTypingSiteToggled($event)"
      ></app-typing-level-section>

      <div class="submit-row">
        <app-main-button label="Créer le compte" type="submit" size="large"></app-main-button>
      </div>

      @if (submitFeedback) {
        <p class="feedback" [class.success]="form.valid" [class.error]="form.invalid">{{ submitFeedback }}</p>
      }
    </form>
  </main>
</div>
